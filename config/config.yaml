      smtp_server: smtp.qq.com
      smtp_port: '465'
      # QQ 等邮箱若报 550 inappropriate content，可改为 true：正文仅简短说明，报告作附件
      html_as_attachment: true
    ntfy:
      server_url: https://ntfy.sh
      topic: ''
      token: ''
    bark:
      url: ''
    slack:
      webhook_url: ''
    generic_webhook:
      webhook_url: ''
      payload_template: ''
storage:
  backend: auto
  formats:
    sqlite: true
    txt: false
    html: true
    # 为 true 时：仅在 timeline 当前允许推送时生成 HTML
    html_only_when_push: false
  local:
    data_dir: output
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ''
    bucket_name: ''
    access_key_id: ''
    secret_access_key: ''
    region: ''
  pull:
    enabled: false
    days: 7
ai:
  model: volcengine/ep-20260308211733-chxvc
  api_key: ''
  api_base: https://ark.cn-beijing.volces.com/api/v3
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []
ai_analysis:
  enabled: true
  language: Chinese
  prompt_file: ai_analysis_prompt.txt
  mode: follow_report
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true
ai_translation:
  enabled: true
  language: 中文
  prompt_file: ai_translation_prompt.txt
  # 仅翻译请求使用；RSS/独立展示区条数多时可加大，或减小 batch_size
  timeout: 300
  batch_size: 40
  scope:
    hotlist: false
    rss: true
    standalone: true
advanced:
  debug: false
  version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version
  mcp_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp
  configs_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: http://127.0.0.1:10801
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ''
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: ━━━━━━━━━━━━━━━━
