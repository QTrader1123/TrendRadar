report:
  mode: current
  display_mode: keyword
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0
filter:
  method: ai
  priority_sort_enabled: true
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: prompt.txt
  extract_prompt_file: extract_prompt.txt
  update_tags_prompt_file: update_tags_prompt.txt
display:
  region_order:
  - ai_analysis
  - new_items
  - hotlist
  - rss
  - standalone
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms:
    - zhihu
    - wallstreetcn-hot
    rss_feeds: []
    max_items: 20
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ''
    dingtalk:
      webhook_url: ''
    wework:
      webhook_url: ''
      msg_type: markdown
    telegram:
      bot_token: ''
      chat_id: ''
